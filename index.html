<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пенсионный Навигатор v2.2</title>
    <style>
        :root { --p-blue: #2c3e50; --a-green: #27ae60; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--p-blue); padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        /* Инструкции */
        .guide { background: #eef2f7; padding: 20px; border-radius: 8px; margin-bottom: 25px; border-left: 5px solid var(--a-green); }
        .guide-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; font-size: 0.85em; }
        .step { background: white; padding: 12px; border-radius: 6px; }
        .step a { color: #2980b9; font-weight: bold; text-decoration: none; }

        .main-layout { display: grid; grid-template-columns: 1fr 380px; gap: 30px; }
        
        /* Секция фондов */
        .funds-container { border: 1px solid #cbd5e1; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .fund-row { display: grid; grid-template-columns: 2fr 1.5fr 100px 40px; gap: 10px; margin-bottom: 10px; align-items: end; }
        .fund-row input, .fund-row select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .add-btn { background: #34495e; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .remove-btn { background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; height: 35px; }
        
        .hint { font-size: 0.75em; color: #64748b; margin-top: 4px; }

        /* Итоги */
        .results-card { background: var(--p-blue); color: white; padding: 25px; border-radius: 10px; position: sticky; top: 20px; }
        .res-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #3e5871; }
        .total-box { font-size: 1.5em; color: #2ecc71; margin-top: 20px; border-top: 2px solid #2ecc71; padding-top: 15px; text-align: center; }
        .calc-btn { width: 100%; background: var(--a-green); color: white; border: none; padding: 18px; border-radius: 6px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="guide">
        <h3>📋 Подготовка данных (Шаги 1-3)</h3>
        <div class="guide-grid">
            <div class="step"><b>1. Поиск:</b> <a href="https://itur.mof.gov.il/" target="_blank">הר הכסף</a> (Все фонды)</div>
            <div class="step"><b>2. Страховки:</b> <a href="https://har-bituach.mof.gov.il/" target="_blank">הר הביטוח</a></div>
            <div class="step"><b>3. Выписки:</b> Кабинеты Harel, Migdal, Menora.</div>
        </div>
    </div>

    <div class="main-layout">
        <div class="inputs">
            <div class="input-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
                <div style="display:flex; flex-direction:column;">
                    <label style="font-weight:600; font-size:0.9em;">Год рождения</label>
                    <input type="number" id="birthYear" value="1965" style="padding:10px; border:1px solid #cbd5e1;">
                </div>
                <div style="display:flex; flex-direction:column;">
                    <label style="font-weight:600; font-size:0.9em;">Цель в месяц (₪)</label>
                    <input type="number" id="targetIncome" value="10000" style="padding:10px; border:1px solid #cbd5e1;">
                </div>
            </div>

            <h3 style="margin-bottom:10px;">📊 Ваши фонды</h3>
            <div class="funds-container" id="fundsList">
                </div>
            <button class="add-btn" onclick="addFundRow()">+ ДОБАВИТЬ ЕЩЕ ОДИН ФОНД</button>

            <button class="calc-btn" onclick="runGlobalCalc()">РАССЧИТАТЬ ОБЩИЙ ПРОГНОЗ</button>
        </div>

        <div class="results-card">
            <h3 style="margin-top:0">ИТОГОВЫЙ ПЛАН</h3>
            <div class="res-row"><span>Найдено фондов:</span> <span id="countF">0</span></div>
            <div class="res-row"><span>Общий капитал:</span> <span id="totalC">0 ₪</span></div>
            <div class="res-row"><span>Пенсия из фондов:</span> <span id="totalP">0 ₪</span></div>
            <div class="res-row"><span>Битуах Леуми:</span> <span id="btlP">0 ₪</span></div>
            <div class="total-box">
                <div style="font-size:0.6em; color:#bdc3c7;">ИТОГО НЕТТО НА РУКИ:</div>
                <span id="finalN">0 ₪</span>
            </div>
            <div id="defReport" style="margin-top:15px; text-align:center; font-size:0.9em;"></div>
        </div>
    </div>
</div>

<script>
    const SHEET_ID = '1p40DGKw6tyq5Z3adtoWiDxuLwo00jApWsfbXPHo4unw';
    
    // Типы фондов с пояснениями
    const fundTypes = {
        'new': { label: 'Керен Пенсия (Новая)', hint: 'Стандартный фонд после 2001 г.' },
        'old': { label: 'Битуах Менаалим (Старый)', hint: 'Полисы до 2001 г. с низким макдемом.' },
        'gemel': { label: 'Купат Гемель', hint: 'Накопительный счет без страховки.' }
    };

    function addFundRow() {
        const div = document.createElement('div');
        div.className = 'fund-row';
        div.innerHTML = `
            <div>
                <select class="f-type">
                    ${Object.keys(fundTypes).map(k => `<option value="${k}">${fundTypes[k].label}</option>`).join('')}
                </select>
                <div class="hint">${fundTypes['new'].hint}</div>
            </div>
            <div>
                <input type="number" class="f-sum" placeholder="Сумма (₪)">
            </div>
            <div>
                <input type="number" class="f-makdem" placeholder="Макдем">
            </div>
            <button class="remove-btn" onclick="this.parentElement.parentElement.remove()">×</button>
        `;
        document.getElementById('fundsList').appendChild(div);
    }

    // Инициализация первой строки
    addFundRow();

    async function runGlobalCalc() {
        try {
            const makdemData = await fetchCSV('Makdem_Reference');
            const birthYear = parseInt(document.getElementById('birthYear').value);
            const target = parseFloat(document.getElementById('targetIncome').value);
            
            let totalCap = 0;
            let totalPension = 0;
            let count = 0;

            const rows = document.querySelectorAll('.fund-row');
            rows.forEach(row => {
                const sum = parseFloat(row.querySelector('.f-sum').value) || 0;
                const type = row.querySelector('.f-type').value;
                let makdem = parseFloat(row.querySelector('.f-makdem').value);

                // Если макдем не введен, берем из таблицы
                if (!makdem) {
                    const mRow = makdemData.find(r => r[0] == birthYear);
                    if (mRow) {
                        makdem = (type === 'old') ? parseFloat(mRow[3]) : parseFloat(mRow[1]);
                    } else { makdem = 200; }
                }

                totalCap += sum;
                totalPension += (sum / makdem);
                count++;
            });

            const btl = 1736; // База
            const finalNetto = totalPension + btl;

            document.getElementById('countF').innerText = count;
            document.getElementById('totalC').innerText = totalCap.toLocaleString() + ' ₪';
            document.getElementById('totalP').innerText = totalPension.toFixed(0) + ' ₪';
            document.getElementById('btlP').innerText = btl + ' ₪';
            document.getElementById('finalN').innerText = finalNetto.toFixed(0) + ' ₪';

            const defDiv = document.getElementById('defReport');
            const diff = target - finalNetto;
            if (diff > 0) {
                defDiv.innerHTML = `⚠️ Дефицит: <b>${diff.toFixed(0)} ₪</b><br>Нужна оптимизация комиссий или доп. взносы.`;
                defDiv.style.color = "#ff7675";
            } else {
                defDiv.innerHTML = "✅ Цель достигнута!";
                defDiv.style.color = "#2ecc71";
            }

        } catch (e) { alert("Ошибка: " + e.message); }
    }

    async function fetchCSV(name) {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${name}`;
        const res = await fetch(url);
        const text = await res.text();
        return text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
    }
</script>
</body>
</html>
