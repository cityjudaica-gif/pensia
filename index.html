<script>
    const SHEET_ID = '1p40DGKw6tyq5Z3adtoWiDxuLwo00jApWsfbXPHo4unw';
    
    async function runEngine() {
        const btn = document.querySelector('button');
        btn.innerText = 'PROCESSING...';
        
        try {
            // Загружаем данные в формате CSV (самый стабильный метод для GitHub Pages)
            const taxData = await fetchCSV('Tax_Engine_Data');
            const makdemData = await fetchCSV('Makdem_Reference');
            
            const birthYear = parseInt(document.getElementById('birthYear').value);
            const gender = document.getElementById('gender').value;
            const capital = parseFloat(document.getElementById('capital').value);
            const salary = parseFloat(document.getElementById('salary').value);
            const isOld = document.getElementById('policyType').value === 'old';
            const isOleh = document.getElementById('isOleh').value === 'yes';

            // Поиск макдема
            const makdemRow = makdemData.find(r => r[0] == birthYear);
            if (!makdemRow) throw new Error("Год рождения не найден в Makdem_Reference");
            
            let makdem = gender === 'male' ? (isOld ? makdemRow[3] : makdemRow[1]) : (isOld ? makdemRow[4] : makdemRow[2]);
            makdem = parseFloat(makdem);

            const pensionBrutto = capital / makdem;
            
            // Получаем константы из Tax_Engine_Data
            const taxStep1 = findInCSV(taxData, 'Tax_Step_1_Limit', 7010);
            const cpValue = findInCSV(taxData, 'Credit_Point_Value', 242);
            const exemptionCeiling = findInCSV(taxData, 'Exemption_Ceiling', 9430);
            const btlLimit = findInCSV(taxData, 'BTL_Income_Limit', 9208);
            const baseZikna = findInCSV(taxData, 'Base_Zikna_Amount', 1736);
            
            // Налоговый щит (67%)
            const ptuar = exemptionCeiling * 0.67;
            const taxablePension = Math.max(0, pensionBrutto - ptuar);
            
            // Льготные баллы
            let cp = (gender === 'female' ? 2.75 : 2.25);
            if (isOleh) cp += 1; 
            
            // Битуах Леуми
            let actualZikna = (salary + pensionBrutto) > btlLimit 
                ? Math.max(0, baseZikna - ((salary + pensionBrutto - btlLimit) * 0.6))
                : baseZikna;

            renderResults([
                ['ПЕНСИЯ (БРУТТО)', pensionBrutto.toFixed(2) + ' ₪'],
                ['МАКДЕМ', makdem],
                ['НАЛОГОВЫЙ ПТУР', ptuar.toFixed(2) + ' ₪'],
                ['БИТУАХ ЛЕУМИ', actualZikna.toFixed(2) + ' ₪'],
                ['ИТОГО НЕТТО (ПЕНСИЯ+БЛ)', (pensionBrutto + actualZikna).toFixed(2) + ' ₪']
            ]);

        } catch (e) {
            console.error(e);
            alert('СБОЙ СИСТЕМЫ: ' + e.message);
        } finally {
            btn.innerText = 'EXECUTE_CALCULATION';
        }
    }

    // Функция загрузки CSV
    async function fetchCSV(sheetName) {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error("Не удалось подключиться к таблице");
        const data = await response.text();
        // Парсим CSV в массив
        return data.split('\n').map(row => row.split(',').map(cell => cell.replace(/"/g, '').trim()));
    }

    function findInCSV(data, key, def) {
        const row = data.find(r => r[0] === key);
        return row ? parseFloat(row[1]) : def;
    }

    function renderResults(data) {
        const res = document.getElementById('results');
        const body = document.getElementById('resultBody');
        body.innerHTML = '';
        data.forEach(row => {
            body.innerHTML += `<tr><td>${row[0]}</td><td class="highlight">${row[1]}</td></tr>`;
        });
        res.style.display = 'block';
    }
</script>
