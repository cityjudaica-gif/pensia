<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пенсионный Навигатор PRO 3.4</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #059669;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .fund-item { background: #f1f5f9; padding: 15px; border-radius: 10px; margin-top: 10px; display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; border-left: 4px solid var(--primary); }
        label { display: block; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); outline: none; }
        .total-box { background: #1e293b; color: white; padding: 30px; border-radius: 12px; text-align: center; }
        .total-amount { font-size: 40px; font-weight: 800; color: #10b981; display: block; }
        .btn-add { background: #e2e8f0; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: 600; }
        .loading { color: var(--primary); font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="card">
        <h3>👤 Личные параметры</h3>
        <div class="grid">
            <div><label>Пол</label><select id="gender"><option value="male">Мужчина</option><option value="female">Женщина</option></select></div>
            <div><label>Год рождения</label><input id="birthYear" type="number" value="1965"></div>
            <div><label>Зарплата (Брутто)</label><input id="salary" type="number" value="12000"></div>
            <div><label>Прогноз</label><select id="scenario"><option value="0.03">3% (Консервативный)</option><option value="0.05" selected>5% (Умеренный)</option><option value="0.07">7% (Агрессивный)</option></select></div>
        </div>
    </div>

    <div class="card">
        <h3>🏦 Пенсионные активы <span id="status" class="loading"></span></h3>
        <div id="fundsList"></div>
        <button class="btn-add" onclick="addFund()">+ Добавить фонд</button>
    </div>

    <div class="total-box">
        <span style="text-transform: uppercase; font-size: 12px; opacity: 0.8;">Прогноз ежемесячного дохода (Нетто)</span>
        <span class="total-amount"><span id="outTotal">0</span> ₪</span>
        <div id="verdict" style="margin-top: 10px; font-size: 14px;"></div>
    </div>
</div>

<script>
// ID вашей таблицы PensiyaData
const SHEET_ID = '1p40DGKw6tyq5Z3adtoWiDxuLwo00jApWsfbXPHo4unw';

// Глобальная переменная для хранения актуальных данных из таблицы
let realMakdemData = [];

// Функция загрузки реальных данных
async function loadRealData() {
    document.getElementById('status').innerText = '[ ЗАГРУЗКА ДАННЫХ ИЗ ТАБЛИЦЫ... ]';
    try {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Makdem_Reference`;
        const res = await fetch(url);
        const text = await res.text();
        realMakdemData = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
        document.getElementById('status').innerText = '[ ДАННЫЕ ОБНОВЛЕНЫ ]';
        calculate();
    } catch (e) {
        document.getElementById('status').innerText = '[ ОШИБКА ДОСТУПА К ТАБЛИЦЕ ]';
        console.error(e);
    }
}

function addFund() {
    const div = document.createElement("div");
    div.className = "fund-item";
    div.innerHTML = `
        <div><label>Тип</label><select class="f-type"><option value="pension">Пенсия</option><option value="manager">Битух Мен.</option><option value="capital">Капитал</option></select></div>
        <div><label>Баланс</label><input class="f-sum" type="number" value="300000"></div>
        <div><label>Взнос %</label><input class="f-dep" type="number" value="18.5"></div>
        <div><label>Комиссия %</label><input class="f-fee" type="number" value="0.5"></div>
        <button onclick="this.parentElement.remove(); calculate();" style="background:none; border:none; color:red; cursor:pointer;">✖</button>
    `;
    document.getElementById("fundsList").appendChild(div);
    calculate();
}

function calculate() {
    if (realMakdemData.length === 0) return;

    const gender = document.getElementById("gender").value;
    const birthYear = +document.getElementById("birthYear").value;
    const salary = +document.getElementById("salary").value;
    const rate = +document.getElementById("scenario").value;

    const retireAge = (gender === "male") ? 67 : (birthYear >= 1964 ? 65 : 62);
    const years = Math.max(0, retireAge - (new Date().getFullYear() - birthYear));
    
    let totalP = 0, totalC = 0;

    document.querySelectorAll(".fund-item").forEach(f => {
        let sum = +f.querySelector(".f-sum").value;
        const dep = +f.querySelector(".f-dep").value / 100;
        const fee = +f.querySelector(".f-fee").value / 100;
        const type = f.querySelector(".f-type").value;

        // Расчет накопления с учетом доходности и комиссий
        for (let i = 0; i < years; i++) {
            sum += (salary * dep * 12);
            sum *= (1 + (rate - fee));
        }

        if (type === "capital") {
            totalC += (sum * 0.04 / 12);
        } else {
            // ПОИСК РЕАЛЬНОГО МАКДЕМА В ТАБЛИЦЕ
            const row = realMakdemData.find(line => line[0] == birthYear);
            let m = 200; // По умолчанию
            if (row) {
                // Колонки в вашей таблице: 0:Год, 1:Муж(Пенс), 2:Жен(Пенс), 3:Муж(Мен), 4:Жен(Мен)
                if (gender === "male") m = (type === "manager" ? row[3] : row[1]);
                else m = (type === "manager" ? row[4] : row[2]);
            }
            totalP += (sum / m);
        }
    });

    // Инфляция 2.5%
    const realP = totalP / Math.pow(1.025, years);
    const totalNet = realP + totalC + (salary * 0.9);

    document.getElementById("outTotal").innerText = Math.round(totalNet).toLocaleString();
}

document.getElementById("app").addEventListener("input", calculate);
addFund();
loadRealData(); // Загрузка данных при старте
</script>
</body>
</html>
