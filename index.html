<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pension Navigator 4.5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Libre+Baskerville:wght@400;700&display=swap');

        :root {
            --primary: #1a4fad;
            --success: #0a6e4a;
            --danger: #b91c1c;
            --bg: #f5f4f0;
            --card: #ffffff;
            --text: #1a1917;
            --border: #ddd9d0;
            --mono: 'IBM Plex Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Libre Baskerville', serif; background: var(--bg); color: var(--text); padding: 20px 16px; }
        .container { max-width: 1100px; margin: 0 auto; }

        .header-nav {
            position: sticky; top: 10px; z-index: 100;
            background: var(--text); border-radius: 8px; padding: 15px 20px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            margin-bottom: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .stat-item { text-align: center; color: #f0ede6; border-right: 1px solid #444; }
        .stat-item:last-child { border: none; }
        .stat-item span { display: block; font-family: var(--mono); font-size: 8px; color: #9c9888; text-transform: uppercase; }
        .stat-item b { font-family: var(--mono); font-size: 15px; }

        .card { background: var(--card); padding: 22px; border-radius: 4px; border: 1px solid var(--border); margin-bottom: 20px; }
        .card h3 { font-family: var(--mono); font-size: 11px; text-transform: uppercase; color: #6b6760; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }

        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        label { display: block; font-family: var(--mono); font-size: 9px; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px 10px; border-radius: 3px; border: 1px solid var(--border); font-family: var(--mono); font-size: 13px; }
        
        .fund-item {
            background: #faf9f6; border: 1px solid var(--border); border-left: 4px solid var(--primary);
            padding: 15px; margin-top: 12px; display: grid;
            grid-template-columns: 1.2fr 1fr 1fr 0.7fr 0.7fr 0.7fr 0.7fr auto; gap: 10px; align-items: end;
        }

        .results-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; margin-bottom: 25px; }
        .result-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0ede6; font-family: var(--mono); font-size: 14px; }
        
        .total-card { background: var(--primary); color: white; padding: 25px; border-radius: 4px; text-align: center; }
        .total-amount { font-family: var(--mono); font-size: 42px; font-weight: 600; margin: 10px 0; }

        .btn { font-family: var(--mono); font-size: 11px; font-weight: 600; text-transform: uppercase; background: var(--text); color: #f0ede6; border: none; padding: 10px 18px; border-radius: 3px; cursor: pointer; }
        .delete-btn { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 22px; }
    </style>
</head>
<body>
<div class="container" id="mainApp">

    <div class="header-nav">
        <div class="stat-item"><span>Выход (Лет)</span><b id="navRetAge">--</b></div>
        <div class="stat-item"><span>До пенсии</span><b id="navYearsLeft">--</b></div>
        <div class="stat-item"><span>Лимит BTL</span><b title="Порог дохода для пособия">9,208 ₪</b></div>
        <div class="stat-item"><span>Итого (Net)</span><b id="navTotal">--</b></div>
    </div>

    <div class="card">
        <h3>01 — Параметры трудоустройства</h3>
        <div class="grid-inputs">
            <div><label>Пол</label><select id="gender"><option value="male">Мужчина</option><option value="female" selected>Женщина</option></select></div>
            <div><label>Дата рождения</label><input id="birthDate" type="date" value="1965-04-20"></div>
            <div><label>Зарплата брутто</label><input id="salary" type="number" value="12000"></div>
            <div><label>Продолжу работать (лет)</label><input id="yearsToWork" type="number" value="2"></div>
        </div>
    </div>

    <div class="card">
        <h3>02 — Накопленные активы</h3>
        <div id="fundsList"></div>
        <button class="btn" onclick="addFund()" style="margin-top:15px; background:#e8e4da; color:var(--text)">+ Добавить актив</button>
    </div>

    <div class="results-grid">
        <div class="card" style="margin-bottom:0">
            <h3>03 — Анализ выплат</h3>
            <div class="result-row"><span>Прогнозная пенсия:</span><b id="outReal">—</b></div>
            <div class="result-row"><span>Пособие (Битуах Леуми):</span><b id="outBtl">—</b></div>
            <div class="result-row"><span>Запас до штрафа:</span><b id="outSafeZone">—</b></div>
            <div class="result-row" style="opacity:0.6; font-size:11px;"><span>Будущий капитал (номинал):</span><b id="outNominal">—</b></div>
        </div>

        <div class="total-card">
            <span style="font-family:var(--mono); font-size:10px; text-transform:uppercase; opacity:0.8;">Ежемесячный доход (Net)</span>
            <span class="total-amount" id="mainTotal">0</span>
            <div id="verdict" style="font-family:var(--mono); font-size:11px;"></div>
        </div>
    </div>
</div>

<script>
// Глобальные константы согласно законодательству IL 2026
const PARAMS = { 
    inf: 0.025,   // Ожидаемая инфляция
    grow: 0.02,  // Рост зарплаты
    btlBase: 1736, // Базовое пособие (одиночка)
    btlMax: 9208,  // Порог дохода для вычета
    btlPenalty: 0.6, // Штраф 60 агорот на шекель
    market: 0.05   // Доходность фондов
};

const MAKDEM = [
    [1960, 179, 200, 183, 204], 
    [1965, 184, 206, 188, 210], 
    [1970, 190, 213, 194, 217]
];

function getRetireAge(gender, dateStr) {
    if (gender === 'male') return 67;
    const year = new Date(dateStr).getFullYear();
    if (year <= 1955) return 62;
    const t = {1956: 62.33, 1957: 62.66, 1958: 63, 1959: 63.33, 1960: 63.66, 1961: 64, 1962: 64.33, 1963: 64.66};
    return t[year] || 65;
}

function addFund(name='Пенсионный фонд', type='pension', sum=450000) {
    const div = document.createElement('div');
    div.className = 'fund-item';
    div.innerHTML = `
        <div><label>Фонд</label><input type="text" value="${name}"></div>
        <div><label>Тип</label><select class="f-type"><option value="pension">Пенсия</option><option value="manager">Битух Мен.</option><option value="capital">Керен Ишт.</option></select></div>
        <div><label>Сумма</label><input type="number" class="f-sum" value="${sum}"></div>
        <div><label>Сотр. %</label><input type="number" class="f-emp" value="6"></div>
        <div><label>Работод. %</label><input type="number" class="f-empr" value="12.5"></div>
        <div><label>Комиссия %</label><input type="number" class="f-fee" value="0.5"></div>
        <div style="text-align:center"><label>Взнос</label><input type="checkbox" class="f-active" checked style="width:auto"></div>
        <button class="delete-btn" onclick="this.parentElement.remove(); calculate();">×</button>
    `;
    document.getElementById('fundsList').appendChild(div);
    calculate();
}

function calculate() {
    const gender = document.getElementById('gender').value;
    const birthDateStr = document.getElementById('birthDate').value;
    const birthDate = new Date(birthDateStr);
    const salary = +document.getElementById('salary').value;
    const yearsToWork = +document.getElementById('yearsToWork').value;

    const retAge = getRetireAge(gender, birthDateStr);
    const today = new Date();
    const yearsToRetire = Math.max(0, retAge - ((today - birthDate) / (1000 * 60 * 60 * 24 * 365.25)));
    
    let totalNominalFuture = 0; // Сумма всех пенсионных выплат в номинале (будущие деньги)
    let totalCapitalFuture = 0; // Сумма всех выплат из капитала (Керен Иштальмут)

    document.querySelectorAll('.fund-item').forEach(f => {
        let currentFundSum = +f.querySelector('.f-sum').value;
        const isActive = f.querySelector('.f-active').checked;
        const depositRate = isActive ? ((+f.querySelector('.f-emp').value) + (+f.querySelector('.f-empr').value)) / 100 : 0;
        const feeRate = (+f.querySelector('.f-fee').value) / 100;
        const type = f.querySelector('.f-type').value;
        
        let tempSalary = salary;
        // Расчет роста фонда до дня пенсии
        for (let i = 0; i < Math.ceil(yearsToRetire); i++) {
            if (isActive && i < yearsToWork) {
                currentFundSum += (tempSalary * depositRate * 12);
                tempSalary *= (1 + PARAMS.grow);
            }
            currentFundSum *= (1 + PARAMS.market - feeRate);
        }

        if (type === 'capital') {
            totalCapitalFuture += (currentFundSum * 0.04 / 12); // Правило 4% SWR
        } else {
            const birthYear = birthDate.getFullYear();
            const row = MAKDEM.reduce((p, c) => Math.abs(c[0] - birthYear) < Math.abs(p[0] - birthYear) ? c : p);
            const m = type === 'manager' ? (gender === 'male' ? row[3] : row[4]) : (gender === 'male' ? row[1] : row[2]);
            totalNominalFuture += (currentFundSum / m);
        }
    });

    // 1. Приводим все пенсионные доходы к сегодняшней покупательной способности (Real)
    const inflationAdj = Math.pow(1 + PARAMS.inf, yearsToRetire);
    const realPensionIncome = (totalNominalFuture + totalCapitalFuture) / inflationAdj;

    // 2. Расчет Битуах Леуми (ВАЖНО: Лимит btlMax тоже в "сегодняшних" ценах)
    let penalty = 0;
    if (realPensionIncome > PARAMS.btlMax) {
        penalty = (realPensionIncome - PARAMS.btlMax) * PARAMS.btlPenalty;
    }
    const finalBtl = Math.max(0, PARAMS.btlBase - penalty);
    const totalNet = realPensionIncome + finalBtl;

    // Вывод данных
    const fmt = n => Math.round(n).toLocaleString() + ' ₪';
    document.getElementById('navRetAge').innerText = retAge.toFixed(1);
    document.getElementById('navYearsLeft').innerText = yearsToRetire.toFixed(1);
    document.getElementById('navTotal').innerText = fmt(totalNet);
    document.getElementById('mainTotal').innerText = Math.round(totalNet).toLocaleString();
    
    document.getElementById('outReal').innerText = fmt(realPensionIncome);
    document.getElementById('outBtl').innerText = fmt(finalBtl);
    document.getElementById('outNominal').innerText = fmt(totalNominalFuture + (totalCapitalFuture*12));
    
    const safeZone = Math.max(0, PARAMS.btlMax - realPensionIncome);
    const szEl = document.getElementById('outSafeZone');
    szEl.innerText = fmt(safeZone);
    szEl.style.color = safeZone > 0 ? "var(--success)" : "var(--danger)";

    const v = document.getElementById('verdict');
    v.innerText = totalNet > 7500 ? "✓ ПРОГНОЗ СТАБИЛЬНЫЙ" : "⚠ ТРЕБУЕТСЯ ОПТИМИЗАЦИЯ";
    v.style.color = totalNet > 7500 ? "#0a6e4a" : "#b91c1c";
}

document.getElementById('mainApp').addEventListener('input', calculate);
addFund('Основная пенсия', 'pension', 450000);
</script>
</body>
</html>
