<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pension PRO Israel</title>

<style>
body {font-family: Arial; background:#0f172a; color:white; padding:20px;}
.container {max-width:1000px; margin:auto;}
.card {background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px;}
input, select {width:100%; padding:10px; margin-top:5px;}
.result {font-size:22px; color:#10b981;}
.small {font-size:12px; color:#94a3b8;}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>👤 Данные</h2>

Возраст: <input id="age" type="number" value="40">
Зарплата: <input id="salary" type="number" value="15000">
Возраст пенсии: <input id="retire" type="number" value="67">

Сценарий:
<select id="scenario">
<option value="pess">Плохой рынок</option>
<option value="base" selected>Нормальный</option>
<option value="good">Хороший</option>
</select>
</div>

<div class="card">
<h2>🏦 Фонды</h2>
<div id="funds"></div>
<button onclick="addFund()">+ Добавить фонд</button>
</div>

<div class="card">
<h2>📊 Результат</h2>

<div>Пенсия (номинал): <span class="result" id="nominal">0</span></div>
<div>Пенсия (реальная): <span class="result" id="real">0</span></div>
<div>Битуах Леуми: <span class="result" id="btl">0</span></div>
<div>ИТОГО: <span class="result" id="total">0</span></div>

<p class="small">Учитываются инфляция, комиссии, рост зарплаты</p>
</div>

</div>

<script>

function addFund(){
    let div=document.createElement("div");
    div.innerHTML=`
    <div class="card">
    Тип:
    <select class="type">
        <option value="pension">Пенсия</option>
        <option value="manager">Битух Мен.</option>
        <option value="capital">Капитал</option>
    </select>

    Баланс:
    <input class="sum" type="number" value="100000">

    Взнос (% от зарплаты):
    <input class="deposit" type="number" value="18.5">

    Комиссия (%):
    <input class="fee" type="number" value="0.8">
    </div>
    `;
    document.getElementById("funds").appendChild(div);
}

addFund();

function getScenario(){
    let s=document.getElementById("scenario").value;
    if(s==="pess") return {r:0.03};
    if(s==="good") return {r:0.07};
    return {r:0.05};
}

function calcMakdem(age){
    return 180 + (age-60)*2; // динамика
}

function run(){

let age=+document.getElementById("age").value;
let salary=+document.getElementById("salary").value;
let retire=+document.getElementById("retire").value;

let years=retire-age;
let infl=0.025;
let salaryGrowth=0.03;

let {r}=getScenario();

let totalCapital=0;

document.querySelectorAll("#funds .card").forEach(f=>{

    let sum=+f.querySelector(".sum").value;
    let dep=+f.querySelector(".deposit").value/100;
    let fee=+f.querySelector(".fee").value/100;

    let s=salary;

    for(let i=0;i<years;i++){
        sum+=s*dep*12;
        sum*=1+(r-fee);
        s*=1+salaryGrowth;
    }

    totalCapital+=sum;
});

let makdem=calcMakdem(retire);

let pensionNominal=totalCapital/makdem;

// инфляция
let inflationFactor=Math.pow(1+infl,years);
let pensionReal=pensionNominal/inflationFactor;

// Битуах Леуми
let btl=1800;
if(retire>=70) btl=2300;

let total=pensionReal+btl;

document.getElementById("nominal").innerText=Math.round(pensionNominal);
document.getElementById("real").innerText=Math.round(pensionReal);
document.getElementById("btl").innerText=Math.round(btl);
document.getElementById("total").innerText=Math.round(total);

}

setInterval(run,1000);

</script>
</body>
</html>
