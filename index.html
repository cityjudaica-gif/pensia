<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пенсионный Консультант v2.9</title>
    <style>
        :root { --p-blue: #1e293b; --a-green: #10b981; --error: #ef4444; --bg: #f1f5f9; }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--p-blue); margin: 0; padding: 10px; }
        
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

        /* Плашка стратегии - теперь адаптивная */
        .strategy-bar { 
            position: sticky; top: 0; z-index: 1000; 
            background: var(--p-blue); color: white; 
            padding: 15px; border-radius: 12px; margin-bottom: 20px;
            display: flex; flex-wrap: wrap; justify-content: space-around; gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .stat-item { text-align: center; flex: 1; min-width: 140px; }
        .stat-item span { display: block; font-size: 0.7em; color: #94a3b8; text-transform: uppercase; }
        .stat-item b { font-size: 1.1em; color: var(--a-green); }

        .main-layout { display: flex; flex-wrap: wrap; gap: 25px; }
        .form-side { flex: 3; min-width: 320px; }
        .result-side { flex: 1; min-width: 320px; }

        /* Поля ввода */
        .input-card { background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .top-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        
        .fund-row { 
            display: flex; flex-wrap: wrap; gap: 8px; 
            background: white; padding: 12px; border-radius: 8px; 
            margin-bottom: 10px; border: 1px solid #e2e8f0; align-items: flex-end;
        }
        .fund-row .field { flex: 1; min-width: 120px; }
        .fund-row .field.small { flex: 0.5; min-width: 80px; }

        .field { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.7em; font-weight: bold; color: #64748b; text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.9em; width: 100%; }

        /* Результаты */
        .sticky-results { position: sticky; top: 100px; background: var(--p-blue); color: white; padding: 25px; border-radius: 15px; }
        .res-line { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #334155; }
        .total-val { font-size: 2.2em; text-align: center; color: var(--a-green); font-weight: bold; margin: 15px 0; }

        .btn-add { background: var(--p-blue); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 20px; }
        .btn-del { background: #fee2e2; color: #ef4444; border: none; padding: 10px; border-radius: 6px; cursor: pointer; }

        #verdict { background: #fff9db; padding: 15px; border-radius: 10px; border-left: 5px solid #facc15; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <div class="strategy-bar">
        <div class="stat-item"><span>Возраст выхода (Гиль Приша)</span><b id="gilPrisha">67</b></div>
        <div class="stat-item"><span>Безопасная З/П</span><b id="safeWork">0 ₪</b></div>
        <div class="stat-item"><span>Эффективность работы</span><b id="workEff">100%</b></div>
    </div>

    <div class="main-layout">
        <div class="form-side">
            <div class="input-card">
                <div class="top-grid">
                    <div class="field">
                        <label>Пол</label>
                        <select id="gender" onchange="run()">
                            <option value="male">Мужчина</option>
                            <option value="female">Женщина</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Год рождения</label>
                        <input type="number" id="birthYear" value="1960" oninput="run()">
                    </div>
                    <div class="field">
                        <label>Цель (Нетто), ₪</label>
                        <input type="number" id="target" value="10000" oninput="run()">
                    </div>
                    <div class="field">
                        <label>Олим Хадаш?</label>
                        <select id="isOleh" onchange="run()">
                            <option value="0">Нет</option>
                            <option value="1">Да</option>
                        </select>
                    </div>
                    <div class="field" style="background:#fff3cd; padding:5px; border-radius:5px;">
                        <label>Зарплата, ₪</label>
                        <input type="number" id="salary" value="0" oninput="run()">
                    </div>
                </div>
            </div>

            <h3>🏦 Мои пенсионные фонды</h3>
            <div id="fundsList"></div>
            <button class="btn-add" onclick="addFund()">+ Добавить фонд или накопление</button>

            <div id="verdict">Введите данные для анализа выгоды работы на пенсии.</div>
        </div>

        <div class="result-side">
            <div class="sticky-results">
                <h4 style="margin:0; font-size:0.8em; color:#94a3b8; text-transform:uppercase;">Итоговый чек в месяц</h4>
                <div class="total-val" id="resTotal">0 ₪</div>
                
                <div class="res-line"><span>Пенсия (Фонды):</span> <b id="resP">0 ₪</b></div>
                <div class="res-line"><span>Битуах Леуми:</span> <b id="resB">0 ₪</b></div>
                <div class="res-line"><span>Зарплата (Нетто):</span> <b id="resS">0 ₪</b></div>
                <div class="res-line"><span>Льготы (CP):</span> <b id="resCP">0 ₪</b></div>
                
                <div id="goalStatus" style="margin-top:15px; text-align:center; font-weight:bold;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const SHEET_ID = '1p40DGKw6tyq5Z3adtoWiDxuLwo00jApWsfbXPHo4unw';

    function addFund() {
        const div = document.createElement('div');
        div.className = 'fund-row';
        div.innerHTML = `
            <div class="field"><label>Название</label><input type="text" placeholder="Harel/Migdal" oninput="run()"></div>
            <div class="field"><label>Тип</label>
                <select class="f-type" onchange="run()">
                    <option value="new">Пенсия</option>
                    <option value="old">Битух Менаалим</option>
                    <option value="capital">Капитал (Иштальмут)</option>
                </select>
            </div>
            <div class="field small"><label>Сумма</label><input type="number" class="f-sum" value="0" oninput="run()"></div>
            <div class="field small"><label>Макдем</label><input type="number" class="f-makdem" placeholder="Авто" oninput="run()"></div>
            <button class="btn-del" onclick="this.parentElement.remove(); run()">×</button>
        `;
        document.getElementById('fundsList').appendChild(div);
    }
    addFund();

    async function run() {
        try {
            const makdemData = await fetchCSV('Makdem_Reference');
            const birthYear = parseInt(document.getElementById('birthYear').value);
            const gender = document.getElementById('gender').value;
            const salary = parseFloat(document.getElementById('salary').value) || 0;
            const isOleh = document.getElementById('isOleh').value === '1';
            const target = parseFloat(document.getElementById('target').value);

            // 1. Расчет Гиль Приша
            let legalAge = (gender === 'male') ? 67 : 62;
            if (gender === 'female' && birthYear >= 1960) {
                if (birthYear <= 1964) legalAge = 63;
                else legalAge = 65;
            }
            document.getElementById('gilPrisha').innerText = legalAge;

            let pensionBrutto = 0;
            let capitalIncome = 0;

            document.querySelectorAll('.fund-row').forEach(row => {
                const type = row.querySelector('.f-type').value;
                const sum = parseFloat(row.querySelector('.f-sum').value) || 0;
                let m = parseFloat(row.querySelector('.f-makdem').value);

                if (type === 'capital') {
                    capitalIncome += (sum * 0.04 / 12);
                } else {
                    if (!m) {
                        const r = makdemData.find(x => x[0] == birthYear);
                        if (r) m = (gender === 'male') ? (type === 'old' ? r[3] : r[1]) : (type === 'old' ? r[4] : r[2]);
                        else m = 200;
                    }
                    pensionBrutto += (sum / (m || 200));
                }
            });

            // 2. Битуах Леуми (Mivchan Hachnasot)
            const LIMIT = 9208;
            const BTL_FULL = 1736;
            let currentBtl = BTL_FULL;
            let penalty = 0;
            
            if ((pensionBrutto + salary) > LIMIT) {
                penalty = (pensionBrutto + salary - LIMIT) * 0.6;
                currentBtl = Math.max(0, BTL_FULL - penalty);
            }

            const safeSal = Math.max(0, LIMIT - pensionBrutto);
            document.getElementById('safeWork').innerText = Math.round(safeSal).toLocaleString() + " ₪";

            // 3. Налоги и КПД
            let cp = (gender === 'female' ? 2.75 : 2.25) + (isOleh ? 1 : 0);
            let taxBenefit = cp * 242;
            let netSalary = salary * 0.9;
            let totalNet = pensionBrutto + currentBtl + capitalIncome + netSalary;

            let eff = salary > 0 ? ((netSalary - penalty) / salary * 100) : 100;
            document.getElementById('workEff').innerText = Math.round(eff) + "%";

            // Вывод
            document.getElementById('resTotal').innerText = Math.round(totalNet).toLocaleString() + " ₪";
            document.getElementById('resP').innerText = Math.round(pensionBrutto).toLocaleString() + " ₪";
            document.getElementById('resB').innerText = Math.round(currentBtl).toLocaleString() + " ₪";
            document.getElementById('resS').innerText = Math.round(netSalary).toLocaleString() + " ₪";
            document.getElementById('resCP').innerText = Math.round(taxBenefit).toLocaleString() + " ₪";

            // Статус и Вердикт
            const gStatus = document.getElementById('goalStatus');
            gStatus.innerText = totalNet >= target ? "✅ ЦЕЛЬ ДОСТИГНУТА" : "❌ ДЕФИЦИТ: " + Math.round(target - totalNet) + " ₪";
            gStatus.style.color = totalNet >= target ? "#10b981" : "#ef4444";

            document.getElementById('verdict').innerHTML = `💡 <b>Вердикт:</b> Вы можете зарабатывать до <b>${Math.round(safeSal)} ₪</b> без потери пособия. При текущей зарплате ваш КПД работы составляет <b>${Math.round(eff)}%</b>.`;

        } catch (e) { console.warn("Waiting for data..."); }
    }

    async function fetchCSV(name) {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${name}`;
        const res = await fetch(url);
        const text = await res.text();
        return text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
    }
</script>

</body>
</html>
