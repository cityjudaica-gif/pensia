<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пенсионный Калькулятор Израиля v2.0</title>
    <style>
        :root {
            --primary-blue: #2c3e50;
            --secondary-blue: #34495e;
            --accent-green: #27ae60;
            --bg-light: #f4f7f6;
            --border-color: #dcdde1;
        }
        body {
            background-color: var(--bg-light);
            color: var(--primary-blue);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 20px;
        }
        .app-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
        }
        h1 {
            color: var(--primary-blue);
            border-bottom: 3px solid var(--accent-green);
            padding-bottom: 10px;
            margin-bottom: 30px;
            font-size: 1.8em;
        }
        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        .input-box {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: var(--secondary-blue);
        }
        input, select {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1em;
            transition: border 0.3s;
        }
        input:focus {
            border-color: var(--accent-green);
            outline: none;
        }
        .action-btn {
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 4px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        .action-btn:hover { background-color: #219150; }

        .results-panel {
            margin-top: 40px;
            display: none;
            border-top: 2px solid var(--border-color);
            padding-top: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th { background: #f9f9f9; color: var(--secondary-blue); }
        .val-cell { text-align: right; font-weight: bold; font-size: 1.1em; }
        .highlight-row { background-color: #e8f5e9; color: var(--accent-green); }
        
        .disclaimer {
            font-size: 0.8em;
            color: #7f8c8d;
            margin-top: 30px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Пенсионный Калькулятор (Израиль)</h1>
    
    <div class="config-grid">
        <div class="input-box">
            <label>Год рождения</label>
            <input type="number" id="birthYear" value="1960">
        </div>
        <div class="input-box">
            <label>Пол</label>
            <select id="gender">
                <option value="male">Мужчина</option>
                <option value="female">Женщина</option>
            </select>
        </div>
        <div class="input-box">
            <label>Накопленный капитал (₪)</label>
            <input type="number" id="capital" value="1500000">
        </div>
        <div class="input-box">
            <label>Текущая зарплата Брутто (₪)</label>
            <input type="number" id="salary" value="0">
        </div>
        <div class="input-box">
            <label>Тип фонда</label>
            <select id="fundType">
                <option value="new">Новый фонд (Макифа/Клалит)</option>
                <option value="old">Старый полис (Битуах Менаалим до 2001)</option>
                <option value="budget">Бюджетная пенсия (Такцивит)</option>
            </select>
        </div>
        <div class="input-box">
            <label>Статус репатрианта (Оле Хадаш)</label>
            <select id="olehStatus">
                <option value="0">Не репатриант / Более 4 лет в стране</option>
                <option value="1">Первые 18 месяцев</option>
                <option value="2">От 19 до 30 месяцев</option>
                <option value="3">От 31 до 42 месяцев</option>
            </select>
        </div>
        <div class="input-box">
            <label>Кол-во детей (до 18 лет)</label>
            <input type="number" id="children" value="0">
        </div>
        <div class="input-box">
            <label>Пенсионный возраст выхода</label>
            <input type="number" id="exitAge" value="67">
        </div>
    </div>

    <button class="action-btn" onclick="executeCalculation()">РАССЧИТАТЬ ПЕНСИОННЫЙ ПЛАН</button>

    <div class="results-panel" id="resultsPanel">
        <table>
            <thead>
                <tr>
                    <th>Показатель</th>
                    <th class="val-cell">Значение</th>
                </tr>
            </thead>
            <tbody id="resTableBody"></tbody>
        </table>
    </div>

    <div class="disclaimer">
        Данные синхронизированы с Google Sheets (ID: 1p40...unw). Расчет является оценочным.
    </div>
</div>

<script>
    const SHEET_ID = '1p40DGKw6tyq5Z3adtoWiDxuLwo00jApWsfbXPHo4unw';

    async function executeCalculation() {
        const btn = document.querySelector('.action-btn');
        btn.innerText = 'ПОЛУЧЕНИЕ ДАННЫХ ИЗ ТАБЛИЦЫ...';

        try {
            const taxData = await fetchCSV('Tax_Engine_Data');
            const makdemData = await fetchCSV('Makdem_Reference');

            // Сбор входных данных
            const birthYear = parseInt(document.getElementById('birthYear').value);
            const gender = document.getElementById('gender').value;
            const capital = parseFloat(document.getElementById('capital').value);
            const salary = parseFloat(document.getElementById('salary').value);
            const fundType = document.getElementById('fundType').value;
            const olehStatus = parseInt(document.getElementById('olehStatus').value);
            const children = parseInt(document.getElementById('children').value);

            // 1. Поиск макдема
            const mRow = makdemData.find(r => r[0] == birthYear);
            if (!mRow) throw new Error("Год рождения не найден в справочнике макдемов");
            
            let makdem;
            if (gender === 'male') {
                makdem = (fundType === 'old') ? mRow[3] : mRow[1];
            } else {
                makdem = (fundType === 'old') ? mRow[4] : mRow[2];
            }
            makdem = parseFloat(makdem);

            // 2. Базовый расчет пенсии
            const pensionBrutto = capital / makdem;

            // 3. Налоговый расчет (Пункт 190 и Некудот Зикуй)
            const ceiling = getSheetVal(taxData, 'Exemption_Ceiling', 9430);
            const cpValue = getSheetVal(taxData, 'Credit_Point_Value', 242);
            
            // Налоговое освобождение (67%)
            const ptuar = ceiling * 0.67;
            const taxableAmount = Math.max(0, pensionBrutto - ptuar);

            // Льготные единицы (CP)
            let totalCP = (gender === 'female' ? 2.75 : 2.25);
            totalCP += (children * 1); // Упрощенно: 1 ед на ребенка
            if (olehStatus === 1) totalCP += 1;
            else if (olehStatus === 2) totalCP += 0.5;
            else if (olehStatus === 3) totalCP += 0.25;

            const taxDiscount = totalCP * cpValue;

            // 4. Битуах Леуми (Тест доходов)
            const btlLimit = getSheetVal(taxData, 'BTL_Income_Limit', 9208);
            const btlBase = getSheetVal(taxData, 'Base_Zikna_Amount', 1736);
            let ziknaFinal = btlBase;
            
            if ((pensionBrutto + salary) > btlLimit) {
                ziknaFinal = Math.max(0, btlBase - ((pensionBrutto + salary - btlLimit) * 0.6));
            }

            // Итоговый вывод
            const totalNetto = (pensionBrutto - Math.max(0, (taxableAmount * 0.1) - taxDiscount)) + ziknaFinal;

            renderFinalTable([
                ['Пенсионная выплата (Брутто)', pensionBrutto.toFixed(2) + ' ₪'],
                ['Примененный коэффициент (Макдем)', makdem],
                ['Необлагаемая сумма (Птур 67%)', ptuar.toFixed(2) + ' ₪'],
                ['Кол-во льготных единиц (CP)', totalCP],
                ['Пособие Битуах Леуми (Нетто)', ziknaFinal.toFixed(2) + ' ₪'],
                ['Ориентировочное НЕТТО на руки', totalNetto.toFixed(2) + ' ₪', true]
            ]);

        } catch (e) {
            alert('Ошибка: ' + e.message);
        } finally {
            btn.innerText = 'РАССЧИТАТЬ ПЕНСИОННЫЙ ПЛАН';
        }
    }

    async function fetchCSV(name) {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${name}`;
        const res = await fetch(url);
        const text = await res.text();
        return text.split('\n').map(row => row.split(',').map(c => c.replace(/"/g, '').trim()));
    }

    function getSheetVal(data, key, def) {
        const row = data.find(r => r[0] === key);
        return row ? parseFloat(row[1]) : def;
    }

    function renderFinalTable(data) {
        const panel = document.getElementById('resultsPanel');
        const body = document.getElementById('resTableBody');
        body.innerHTML = '';
        data.forEach(item => {
            const row = document.createElement('tr');
            if (item[2]) row.className = 'highlight-row';
            row.innerHTML = `<td>${item[0]}</td><td class="val-cell">${item[1]}</td>`;
            body.appendChild(row);
        });
        panel.style.display = 'block';
    }
</script>

</body>
</html>
