<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pension Navigator PRO</title>

<style>
:root {
    --bg:#0f172a;
    --card:#1e293b;
    --accent:#10b981;
    --text:#e2e8f0;
    --muted:#94a3b8;
}

body {
    margin:0;
    font-family: system-ui;
    background:var(--bg);
    color:var(--text);
}

.container {
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.card {
    background:var(--card);
    padding:20px;
    border-radius:14px;
    margin-bottom:20px;
}

h2,h3 {margin-top:0}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
}

input,select {
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:5px;
}

button {
    background:var(--accent);
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.fund {
    background:#0f172a;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.result {
    font-size:28px;
    color:var(--accent);
    font-weight:bold;
}

.small {
    color:var(--muted);
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>👤 Параметры</h2>
<div class="grid">

<div>
Пол
<select id="gender">
<option value="male">Мужчина</option>
<option value="female">Женщина</option>
</select>
</div>

<div>
Год рождения
<input id="birthYear" type="number" value="1985">
</div>

<div>
Зарплата
<input id="salary" type="number" value="15000">
</div>

<div>
Сценарий
<select id="scenario">
<option value="pess">Плохой</option>
<option value="base" selected>Нормальный</option>
<option value="good">Хороший</option>
</select>
</div>

</div>
</div>

<div class="card">
<h2>🏦 Фонды</h2>
<div id="funds"></div>
<button onclick="addFund()">+ Добавить фонд</button>
</div>

<div class="card">
<h2>📊 Результат</h2>

<div>Пенсия (номинал): <span class="result" id="nominal">0</span></div>
<div>Пенсия (реальная): <span class="result" id="real">0</span></div>
<div>Битуах Леуми: <span class="result" id="btl">0</span></div>
<div>ИТОГО: <span class="result" id="total">0</span></div>

<p class="small">Учитываются инфляция, комиссии и рост зарплаты</p>
</div>

<div class="card" id="insight"></div>

</div>

<script>

// ===== CONFIG =====
const CONFIG = {
    inflation:0.025,
    salaryGrowth:0.03,
    scenarios:{
        pess:0.03,
        base:0.05,
        good:0.07
    }
};

// ===== ADD FUND =====
function addFund(){
    let div=document.createElement("div");
    div.className="fund";
    div.innerHTML=`
    Тип:
    <select class="type">
        <option value="pension">Пенсия</option>
        <option value="manager">Битух Мен.</option>
        <option value="capital">Капитал</option>
    </select>

    Баланс:
    <input class="sum" type="number" value="100000">

    Взнос (%):
    <input class="deposit" type="number" value="18.5">

    Комиссия (%):
    <input class="fee" type="number" value="0.8">
    `;
    document.getElementById("funds").appendChild(div);
}

addFund();

// ===== HELPERS =====
function getRetireAge(gender,year){
    if(gender==="male") return 67;
    if(year>=1964) return 65;
    if(year>=1960) return 63;
    return 62;
}

function calcMakdem(age,gender){
    let base = gender==="female"?200:190;
    return base + (age-60)*2;
}

// ===== CORE =====
function calculate(){

let gender=document.getElementById("gender").value;
let birthYear=+document.getElementById("birthYear").value;
let salary=+document.getElementById("salary").value;
let scenario=document.getElementById("scenario").value;

let r=CONFIG.scenarios[scenario];

let age=new Date().getFullYear()-birthYear;
let retire=getRetireAge(gender,birthYear);
let years=retire-age;

let totalCapital=0;
let pension=0;
let capIncome=0;

document.querySelectorAll(".fund").forEach(f=>{

    let sum=+f.querySelector(".sum").value;
    let dep=+f.querySelector(".deposit").value/100;
    let fee=+f.querySelector(".fee").value/100;

    let s=salary;

    for(let i=0;i<years;i++){
        sum+=s*dep*12;
        sum*=1+(r-fee);
        s*=1+CONFIG.salaryGrowth;
    }

    totalCapital+=sum;

    if(f.querySelector(".type").value==="capital"){
        capIncome+=sum*0.04/12;
    }else{
        let makdem=calcMakdem(retire,gender);
        pension+=sum/makdem;
    }

});

// инфляция
let inflationFactor=Math.pow(1+CONFIG.inflation,years);
let real=pension/inflationFactor;

// ביטוח לאומי
let btl=1800;
if(retire>=70) btl=2300;

let total=real+btl+capIncome;

// UI
document.getElementById("nominal").innerText=Math.round(pension);
document.getElementById("real").innerText=Math.round(real);
document.getElementById("btl").innerText=Math.round(btl);
document.getElementById("total").innerText=Math.round(total);

// insights
let insight=document.getElementById("insight");

if(real<5000){
    insight.innerHTML="⚠️ Пенсия низкая. Увеличь взносы или оптимизируй фонд.";
}
else if(real<8000){
    insight.innerHTML="🟡 Средний уровень. Можно улучшить за счет комиссий.";
}
else{
    insight.innerHTML="🟢 Отличный уровень пенсии.";
}

}

// автообновление
setInterval(calculate,1000);

</script>

</body>
</html>
